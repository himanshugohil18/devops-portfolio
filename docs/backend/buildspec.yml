# =============================================================================
# AWS CodeBuild Buildspec for Node.js + MongoDB Backend
# =============================================================================
# 
# This buildspec demonstrates CI/CD best practices:
# - No database credentials required during build
# - Multi-stage Docker builds
# - Security scanning
# - Proper tagging strategy
#
# =============================================================================

version: 0.2

env:
  variables:
    # Non-sensitive build configuration
    NODE_ENV: "production"
    DOCKER_BUILDKIT: "1"
  
phases:
  pre_build:
    commands:
      - echo "=== Pre-build Phase ==="
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      
      - echo "Setting up build variables..."
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPOSITORY_NAME
      
      - echo "Build ID: $CODEBUILD_BUILD_ID"
      - echo "Commit Hash: $COMMIT_HASH"
      - echo "Image Tag: $IMAGE_TAG"

  build:
    commands:
      - echo "=== Build Phase ==="
      - echo "Building Docker image..."
      
      # Build with BuildKit for better caching and security
      - |
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from $REPOSITORY_URI:latest \
          -t $REPOSITORY_URI:$IMAGE_TAG \
          -t $REPOSITORY_URI:latest \
          -f Dockerfile \
          .
      
      - echo "Docker image built successfully"
      
      # Run security scan (optional but recommended)
      - echo "Running security scan..."
      - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image --severity HIGH,CRITICAL --exit-code 0 $REPOSITORY_URI:$IMAGE_TAG || true

  post_build:
    commands:
      - echo "=== Post-build Phase ==="
      
      - echo "Pushing Docker images to ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      
      - echo "Creating imagedefinitions.json for ECS deployment..."
      - |
        cat > imagedefinitions.json << EOF
        [
          {
            "name": "backend",
            "imageUri": "$REPOSITORY_URI:$IMAGE_TAG"
          }
        ]
        EOF
      
      - echo "Build completed successfully"
      - echo "Image URI: $REPOSITORY_URI:$IMAGE_TAG"

artifacts:
  files:
    - imagedefinitions.json
    - appspec.yml
  discard-paths: yes

cache:
  paths:
    - '/root/.npm/**/*'
    - 'node_modules/**/*'

reports:
  # Optional: Test reports
  test-reports:
    files:
      - 'test-results/**/*'
    file-format: JUNITXML
